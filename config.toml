baseurl = "https://battle1king.github.io/SF_blog/"
title = "SF Blog"
theme = "hugo-theme-cleanwhite"
languageCode = "en-us"
preserveTaxonomyNames = true
hasCJKLanguage = true
enableEmoji = true

[pagination]
  pagerSize = 10

[params]
  header_image = "img/home-bg-jeep.jpg"
  SEOTitle = "SF Blog"
  description = "My personal blog built with Hugo"
  keyword = "blog, Hugo, cleanwhite"
  slogan = "Welcome to my blog"

  image_404 = "img/404-bg.jpg"
  title_404 = "Page not found :("
  omit_categories = false

  # Sidebar settings
  sidebar_about_description = "A personal blog"
  sidebar_avatar = "img/avatar-zhaohuabing.jpg"

  featured_tags = true
  featured_condition_size = 1

  # 打赏功能
  reward = false

  friends = false
  bookmarks = false
  about_me = true

  [params.social]
  rss    = true
  github = "https://github.com/battle1king"

  [[params.additional_menus]]
  title = "ARCHIVE"
  href  = "/archive/"
  [[params.additional_menus]]
  title = "ABOUT"
  href  = "/about/"

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[markup]
  [markup.tableOfContents]
    endLevel = 2
    startLevel = 1
  [markup.highlight]
    style = "dracula"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
